# Render Blueprint — deploys the FastAPI backend as a free web service.
# In Render: New + → Blueprint → connect this repo. It reads this file.
services:
  - type: web
    name: vectorshift-backend
    runtime: python
    rootDir: backend-20260626T023302Z-3-001/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Set this to your deployed frontend URL after the first deploy,
      # e.g. https://vectorshift-yourname.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
